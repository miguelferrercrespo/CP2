---
- name: Refresh apt cache on control node
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true


########################################
# DEPENDENCIES
########################################

- name: Ensure Kubernetes python client is installed
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
  become: true


########################################
# AKS AUTHENTICATION
########################################

- name: Retrieve kubeconfig from AKS
  ansible.builtin.command:
    cmd: >
      az aks get-credentials
      --resource-group {{ resource_group_name }}
      --name {{ aks_name }}
      --overwrite-existing
  changed_when: true


########################################
# NAMESPACE
########################################

- name: Ensure application namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ app_namespace }}"


########################################
# ACR IMAGE PULL SECRET
########################################

- name: Generate docker auth configuration
  ansible.builtin.set_fact:
    acr_dockerconfigjson: >-
      {{
        {
          'auths': {
            acr_login_server: {
              'username': acr_username,
              'password': acr_password,
              'auth': (acr_username ~ ':' ~ acr_password) | b64encode
            }
          }
        } | to_json | b64encode
      }}
  no_log: true


- name: Create registry secret inside namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ acr_secret_name }}"
        namespace: "{{ app_namespace }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ acr_dockerconfigjson }}"
  no_log: true


########################################
# APPLICATION DEPLOYMENT
########################################

- name: Deploy backend, pvc and frontend resources
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template','app_template.yml.j2') | from_yaml_all | list }}"