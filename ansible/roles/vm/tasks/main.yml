---
- name: Refresh package cache on VM
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Podman runtime is installed
  ansible.builtin.apt:
    name: podman
    state: present


########################################
# AUTHENTICATION AGAINST ACR
########################################

- name: Authenticate to Azure Container Registry
  containers.podman.podman_login:
    registry: "{{ acr_login_server }}"
    username: "{{ acr_username }}"
    password: "{{ acr_password }}"
  no_log: true


########################################
# IMAGE MANAGEMENT
########################################

- name: Retrieve web container image from registry
  containers.podman.podman_image:
    name: "{{ acr_login_server }}/{{ web_image_name }}:{{ container_image_tag }}"
    state: present


########################################
# CONTAINER EXECUTION
########################################

- name: Start web container
  containers.podman.podman_container:
    name: "{{ web_container_name }}"
    image: "{{ acr_login_server }}/{{ web_image_name }}:{{ container_image_tag }}"
    state: started
    recreate: true
    restart_policy: always
    ports:
      - "{{ web_container_port }}:80"